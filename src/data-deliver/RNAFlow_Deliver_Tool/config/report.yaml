data_delivery:
  delivery_mode: copy
  output_dir: ./full_delivery
  threads: 8
  include_qc_summary: true
  exclude_patterns: []
  
  include_patterns:
    - pattern: "01.qc/multiqc_merge_qc/multiqc_merge_qc_report_data/multiqc_general_stats.txt"
      dest: "data/index/multiqc_qc_general_stats.txt"
      type: "file"

    - pattern: "02.mapping/mapping_report/multiqc_mapping_report_data/multiqc_general_stats.txt"
      dest: "data/index/multiqc_mapping_general_stats.txt"
      type: "file"

    - pattern: "03.count/merge_rsem_tpm.tsv"
      dest: "data/index/merge_rsem_tpm.tsv"
      type: "file"

    - pattern: "samples.csv"
      dest: "data/index/sample.csv"
      type: "file"

    - pattern: "01.qc/multiqc_short_read_trim/multiqc_short_read_trim_report_data/"
      dest: "data/fastp_trim_report/multiqc_short_read_trim_report_data/"
      type: "dir"

    - pattern: "01.qc/multiqc_short_read_trim/multiqc_short_read_trim_report_data/multiqc_general_stats.txt"
      dest: "data/fastp_trim_report/multiqc_general_stats.txt"
      type: "file"

    - pattern: "01.qc/fastq_screen_multiqc_r1/multiqc_r1_fastq_screen_report_data/"
      dest: "data/fastq_screen_report/fastq_screen_multiqc_r1/multiqc_r1_fastq_screen_report_data/"
      type: "dir"

    - pattern: "01.qc/fastq_screen_multiqc_r2/multiqc_r2_fastq_screen_report_data/"
      dest: "data/fastq_screen_report/fastq_screen_multiqc_r2/multiqc_r2_fastq_screen_report_data/"
      type: "dir"

    - pattern: "02.mapping/mapping_report/multiqc_mapping_report_data/"
      dest: "data/QualiMap/multiqc_data/"
      type: "dir"
    
    - pattern: "contrasts.csv"
      dest: "data/index/contrasts.csv"
      type: "file"

    - pattern: "06.DEG/DESEQ2/*_DEG.csv"
      dest: "data/res/DEG/"
      type: "dir"

    - pattern: "07.Enrichments/*.csv"
      dest: "data/res/Enrichments/"
      type: "dir"