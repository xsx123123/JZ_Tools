DATABASE  Lactuca_sativa_V11  /data/jzhang/reference/Lactuca_sativa_V11/bowtie2_Lactuca_sativa_V11_index/Lactuca_sativa_V11_index
DATABASE  Aspsy1  /data/jzhang/reference/fastq_screen_database/bowtie2_Aspsy1_index/Aspsy1_index
DATABASE  Penicillium_subrubescens  /data/jzhang/reference/fastq_screen_database/bowtie2_Penicillium_subrubescens_index/Penicillium_subrubescens_index
DATABASE  Agrobacterium_vaccinii  /data/jzhang/reference/fastq_screen_database/bowtie2_Agrobacterium_vaccinii_index/Agrobacterium_vaccinii_index
DATABASE  Pseudomonas /data/jzhang/reference/fastq_screen_database/bowtie2_Pseudomonas_index/Pseudomonas_index
DATABASE  Streptomyces_clavuligerus /data/jzhang/reference/fastq_screen_database/bowtie2_Streptomyces_clavuligerus_index/Streptomyces_clavuligerus_index
